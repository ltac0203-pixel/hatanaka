name: 機能要望 / Feature request
description: 新機能の提案 / Suggest a new feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題 / Problem
      description: どんな問題を解決したいか / What problem are you trying to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案する解決策 / Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案 / Alternatives considered
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: 補足 / Additional context
    validations:
      required: false
